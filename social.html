<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Zona social</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">

<div class="store-shell">
  <header class="store-header">
    <div>
      <h1>Zona social</h1>
      <p class="helper-text">Presentaciones, conversaciones y comunidad entre usuarios.</p>
    </div>
    <div class="store-actions">
      <button class="secondary-btn" onclick="window.location.href='perfil.html'">Mi perfil</button>
      <button class="secondary-btn" onclick="window.location.href='acerca.html'">Acerca</button>
      <button class="secondary-btn" onclick="window.location.href='chat.html'">Mensajes</button>
      <button class="secondary-btn" onclick="window.location.href='tienda.html'">Tienda</button>
    </div>
  </header>

  <section class="panel-card">
    <div class="social-composer">
      <div class="identity-row">
        <div id="composerAvatar" class="profile-avatar avatar-fallback"></div>
        <div>
          <h2>Crear publicación</h2>
          <p class="helper-text">Comparte una idea, una presentación o abre una conversación para la comunidad.</p>
        </div>
      </div>
      <textarea id="postInput" class="social-textarea" placeholder="¿Qué quieres compartir hoy?"></textarea>
      <div class="social-composer-actions">
        <span class="helper-text">Publica algo breve y claro para generar mejores respuestas.</span>
        <button id="publishBtn">Publicar</button>
      </div>
    </div>
    <p id="estado" class="helper-text"></p>
  </section>

  <section class="panel-card">
    <div class="panel-header">
      <h2>Comunidad</h2>
      <button class="secondary-btn" onclick="cargarPosts()">Actualizar</button>
    </div>
    <div id="postList" class="social-feed"></div>
  </section>
</div>

<script>
const API_URL = window.location.origin;
const token = localStorage.getItem("token");
const currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");

if (!token || !localStorage.getItem("currentUser")) {
  window.location.href = "login.html";
}

document.getElementById("publishBtn").addEventListener("click", crearPost);

async function api(path, options = {}) {
  const response = await fetch(`${API_URL}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(options.headers || {})
    }
  });

  const data = await response.json();
  if (!response.ok) {
    throw new Error(data.error || "Error inesperado");
  }
  return data;
}

function getInitial(name) {
  return String(name || "?").trim().charAt(0).toUpperCase() || "?";
}

function avatarMarkup(name, photo) {
  if (photo) {
    return `<img class="profile-avatar" src="${photo}" alt="${name}">`;
  }
  return `<div class="profile-avatar avatar-fallback">${getInitial(name)}</div>`;
}

function formatTime(value) {
  try {
    return new Date(value).toLocaleString([], {
      day: "2-digit",
      month: "short",
      hour: "2-digit",
      minute: "2-digit"
    });
  } catch (error) {
    return "";
  }
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function composerSetup() {
  const avatar = document.getElementById("composerAvatar");
  avatar.textContent = getInitial(currentUser?.apodo || currentUser?.nombre || "?");
  if (currentUser?.foto_perfil) {
    avatar.style.backgroundImage = `url("${currentUser.foto_perfil}")`;
    avatar.textContent = "";
    avatar.classList.remove("avatar-fallback");
  }
}

async function crearPost() {
  const input = document.getElementById("postInput");
  const content = input.value.trim();
  const estado = document.getElementById("estado");
  estado.textContent = "";

  if (!content) {
    estado.textContent = "Escribe algo antes de publicar.";
    return;
  }

  try {
    await api("/api/posts", {
      method: "POST",
      body: JSON.stringify({ content })
    });
    input.value = "";
    await cargarPosts();
  } catch (error) {
    estado.textContent = error.message;
  }
}

async function comentar(postId) {
  const input = document.getElementById(`comment-${postId}`);
  const content = input.value.trim();
  const estado = document.getElementById("estado");
  estado.textContent = "";

  if (!content) {
    estado.textContent = "El comentario está vacío.";
    return;
  }

  try {
    await api(`/api/posts/${postId}/comments`, {
      method: "POST",
      body: JSON.stringify({ content })
    });
    input.value = "";
    await cargarPosts();
  } catch (error) {
    estado.textContent = error.message;
  }
}

async function reaccionar(postId, reaction, currentReaction) {
  const estado = document.getElementById("estado");
  estado.textContent = "";

  try {
    await api(`/api/posts/${postId}/reactions`, {
      method: "POST",
      body: JSON.stringify({
        reaction,
        toggle_off: currentReaction === reaction
      })
    });
    await cargarPosts();
  } catch (error) {
    estado.textContent = error.message;
  }
}

async function cargarPosts() {
  const container = document.getElementById("postList");
  container.innerHTML = "<p class='helper-text'>Cargando publicaciones...</p>";

  try {
    const posts = await api("/api/posts");
    if (!posts.length) {
      container.innerHTML = "<p class='helper-text'>Todavía no hay publicaciones en la comunidad.</p>";
      return;
    }

    container.innerHTML = posts.map((post) => `
      <article class="social-post">
        <div class="social-post-header">
          <div class="identity-row">
            ${avatarMarkup(post.author_nombre, post.author_foto)}
            <div>
              <strong>${post.author_nombre}</strong>
              <span class="product-meta">${post.author_role || "usuario"}</span>
              <small class="social-time">${formatTime(post.created_at)}</small>
            </div>
          </div>
        </div>
        <p class="social-post-copy">${escapeHtml(post.content)}</p>
        <div class="social-reactions">
          <button class="secondary-btn reaction-btn ${post.user_reaction === "like" ? "active" : ""}" onclick="reaccionar(${post.id}, 'like', '${post.user_reaction || ""}')">Me gusta ${post.reactions.like || 0}</button>
          <button class="secondary-btn reaction-btn ${post.user_reaction === "fire" ? "active" : ""}" onclick="reaccionar(${post.id}, 'fire', '${post.user_reaction || ""}')">Fuego ${post.reactions.fire || 0}</button>
          <button class="secondary-btn reaction-btn ${post.user_reaction === "idea" ? "active" : ""}" onclick="reaccionar(${post.id}, 'idea', '${post.user_reaction || ""}')">Idea ${post.reactions.idea || 0}</button>
        </div>
        <div class="comment-list">
          ${post.comments.map((comment) => `
            <div class="comment-item">
              <div class="identity-row">
                ${avatarMarkup(comment.author_nombre, comment.author_foto)}
                <div>
                  <strong>${comment.author_nombre}</strong>
                  <small class="social-time">${formatTime(comment.created_at)}</small>
                </div>
              </div>
              <span>${escapeHtml(comment.content)}</span>
            </div>
          `).join("")}
        </div>
        <div class="comment-form">
          <input id="comment-${post.id}" type="text" placeholder="Escribe una respuesta a esta publicación">
          <button class="secondary-btn" onclick="comentar(${post.id})">Responder</button>
        </div>
      </article>
    `).join("");
  } catch (error) {
    container.innerHTML = `<p class='helper-text'>${error.message}</p>`;
  }
}

composerSetup();
cargarPosts();
</script>

</body>
</html>
