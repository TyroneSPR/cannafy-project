<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Recuperar contraseña</title>
  <link rel="icon" type="image/png" href="cannafy-logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Recuperar contraseña</h2>
  <p>Ingresa tu correo o teléfono y define una nueva contraseña para volver a entrar.</p>

  <input type="text" id="identifier" placeholder="Correo electrónico o número de teléfono">
  <input type="password" id="newPassword" placeholder="Nueva contraseña (mínimo 6 caracteres)">
  <button id="btnReset">Actualizar contraseña</button>
  <p id="estado" class="helper-text"></p>
  <a class="text-link" href="index.html">Volver al login</a>
</div>

<script>
const API_URL = window.location.origin;
const IS_LOCAL_FILE = window.location.protocol === "file:";

document.getElementById("btnReset").addEventListener("click", resetPassword);

function seedLocalUsers() {
  const users = JSON.parse(localStorage.getItem("localAuthUsers") || "[]");
  const adminUser = users.find((user) => user.identifier.toLowerCase() === "cannafy.pe@gmail.com");
  if (adminUser) {
    adminUser.nombre = "ADM CANNAFY";
    adminUser.apodo = "ADM CANNAFY";
    adminUser.bio = "Cuenta administrativa compartida de Cannafy.";
    adminUser.foto_perfil = adminUser.foto_perfil || "cannafy-logo.png";
    adminUser.verified = true;
    localStorage.setItem("localAuthUsers", JSON.stringify(users));
  } else {
    users.unshift({
      id: 1,
      identifier: "cannafy.pe@gmail.com",
      telefono: "",
      password: "123456",
      role: "admin",
      nombre: "ADM CANNAFY",
      apodo: "ADM CANNAFY",
      bio: "Cuenta administrativa compartida de Cannafy.",
      foto_perfil: "cannafy-logo.png",
      verified: true
    });
    localStorage.setItem("localAuthUsers", JSON.stringify(users));
  }
  return users;
}

async function resetPassword() {
  const identifier = document.getElementById("identifier").value.trim();
  const newPassword = document.getElementById("newPassword").value;
  const estado = document.getElementById("estado");
  estado.textContent = "";

  if (!identifier || newPassword.length < 6) {
    estado.textContent = "Completa tu acceso y una nueva contraseña válida.";
    return;
  }

  if (IS_LOCAL_FILE) {
    return resetLocal(identifier, newPassword, estado);
  }

  try {
    const response = await fetch(`${API_URL}/api/auth/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ identifier, new_password: newPassword })
    });

    const result = await response.json();
    if (!response.ok) {
      estado.textContent = result.error || "No se pudo actualizar la contraseña.";
      return;
    }

    localStorage.setItem("lastLoginIdentifier", identifier);
    estado.textContent = "Contraseña actualizada. Ya puedes iniciar sesión.";
    setTimeout(() => {
      window.location.href = "index.html";
    }, 900);
  } catch (error) {
    resetLocal(identifier, newPassword, estado);
  }
}

function resetLocal(identifier, newPassword, estado) {
  const users = seedLocalUsers();
  const clean = identifier.trim().toLowerCase();
  const user = users.find((item) =>
    item.identifier.toLowerCase() === clean || (item.telefono && item.telefono === identifier.trim())
  );

  if (!user) {
    estado.textContent = "No encontramos una cuenta con ese acceso.";
    return;
  }

  user.password = newPassword;
  localStorage.setItem("localAuthUsers", JSON.stringify(users));
  localStorage.setItem("lastLoginIdentifier", identifier.trim());
  estado.textContent = "Contraseña actualizada. Ya puedes iniciar sesión.";
  setTimeout(() => {
    window.location.href = "index.html";
  }, 900);
}
</script>

</body>
</html>
