<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Registro dealer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Registro de dealer</h2>
  <p>Crea tu cuenta para publicar productos y gestionar tu vitrina.</p>

  <input type="text" id="nombre" placeholder="Apodo o nombre comercial" maxlength="24">
  <input type="number" id="edad" placeholder="Edad">
  <input type="text" id="documento" placeholder="Documento de identidad" maxlength="8">

  <div class="telefono-container">
    <select id="prefijo">
      <option value="+51">+51</option>
      <option value="+52">+52</option>
      <option value="+54">+54</option>
      <option value="+55">+55</option>
      <option value="+56">+56</option>
      <option value="+57">+57</option>
      <option value="+58">+58</option>
      <option value="+591">+591</option>
      <option value="+593">+593</option>
    </select>
    <input type="tel" id="telefono" placeholder="Número de teléfono" maxlength="15">
  </div>

  <input type="email" id="correo" placeholder="Correo electrónico">
  <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)">

  <button id="btnRegistro">Crear cuenta dealer</button>
  <p id="estado" class="helper-text"></p>
  <a class="text-link" href="login.html">Ya tengo cuenta</a>
</div>

<script>
const API_URL = window.location.origin;

if (localStorage.getItem("terminos") !== "aceptado") {
  window.location.href = "index.html";
}

document.getElementById("btnRegistro").addEventListener("click", registrar);

async function registrar() {
  const estado = document.getElementById("estado");
  estado.textContent = "";

  const payload = {
    role: "dealer",
    nombre: document.getElementById("nombre").value.trim(),
    edad: document.getElementById("edad").value.trim(),
    documento: document.getElementById("documento").value.trim(),
    telefono: document.getElementById("prefijo").value + document.getElementById("telefono").value.trim(),
    correo: document.getElementById("correo").value.trim(),
    password: document.getElementById("password").value,
    acepto_terminos: true
  };

  try {
    const response = await fetch(`${API_URL}/api/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (!response.ok) {
      estado.textContent = result.error || "No se pudo crear la cuenta.";
      return;
    }

    localStorage.setItem("lastRegisteredEmail", payload.correo);
    estado.textContent = "Cuenta dealer creada. Ahora inicia sesión.";
    setTimeout(() => {
      window.location.href = "login.html";
    }, 900);
  } catch (error) {
    estado.textContent = "No se pudo conectar con la API.";
  }
}
</script>

</body>
</html>
