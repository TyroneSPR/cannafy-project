<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Reportar bug</title>
  <link rel="icon" type="image/png" href="cannafy-logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">

<div class="store-shell">
  <header class="store-header">
    <div>
      <h1>Reportar bug</h1>
      <p class="helper-text">Cuéntanos qué pasó. Si puedes, añade una imagen para que sea más fácil encontrar el problema.</p>
    </div>
    <div class="store-actions">
      <button class="secondary-btn" onclick="history.back()">Volver</button>
      <button class="secondary-btn" onclick="window.location.href='tienda.html'">Tienda</button>
      <button class="secondary-btn" onclick="window.location.href='social.html'">Cannacrew's</button>
    </div>
  </header>

  <section class="panel-card">
    <div class="form-grid">
      <input id="imageUrl" type="url" placeholder="URL de imagen opcional">
    </div>
    <input id="imageFile" type="file" accept="image/*">
    <textarea id="reportContent" class="social-textarea" placeholder="Describe el error, qué intentaste hacer y qué esperabas que pasara"></textarea>
    <div class="image-preview-shell">
      <img id="reportPreview" class="image-preview" alt="Vista previa del reporte">
    </div>
    <button id="submitReportBtn">Enviar reporte</button>
    <p id="estado" class="helper-text"></p>
  </section>
</div>

<script>
const API_URL = window.location.origin;
const token = localStorage.getItem("token");
let imageBase64 = "";

if (!token) {
  window.location.href = "index.html";
}

document.getElementById("submitReportBtn").addEventListener("click", enviarReporte);
document.getElementById("imageFile").addEventListener("change", cargarImagenArchivo);
document.getElementById("imageUrl").addEventListener("input", actualizarPreviewDesdeUrl);

async function api(path, options = {}) {
  const response = await fetch(`${API_URL}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(options.headers || {})
    }
  });
  const data = await response.json();
  if (!response.ok) {
    throw new Error(data.error || "Error inesperado");
  }
  return data;
}

function renderPreview(src) {
  const preview = document.getElementById("reportPreview");
  if (!src) {
    preview.removeAttribute("src");
    preview.style.display = "none";
    return;
  }
  preview.src = src;
  preview.style.display = "block";
}

function cargarImagenArchivo(event) {
  const file = event.target.files[0];
  if (!file) {
    imageBase64 = "";
    renderPreview(document.getElementById("imageUrl").value.trim());
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    imageBase64 = String(reader.result || "");
    renderPreview(imageBase64);
  };
  reader.readAsDataURL(file);
}

function actualizarPreviewDesdeUrl() {
  if (!imageBase64) {
    renderPreview(document.getElementById("imageUrl").value.trim());
  }
}

async function enviarReporte() {
  const estado = document.getElementById("estado");
  estado.textContent = "";
  try {
    await api("/api/reports", {
      method: "POST",
      body: JSON.stringify({
        content: document.getElementById("reportContent").value.trim(),
        imagen: imageBase64 || document.getElementById("imageUrl").value.trim()
      })
    });
    document.getElementById("reportContent").value = "";
    document.getElementById("imageUrl").value = "";
    document.getElementById("imageFile").value = "";
    imageBase64 = "";
    renderPreview("");
    estado.textContent = "Reporte enviado. Gracias por ayudar a mejorar Cannafy.";
  } catch (error) {
    estado.textContent = error.message;
  }
}
</script>

</body>
</html>
