<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Perfil</title>
  <link rel="icon" type="image/png" href="cannafy-logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">

<div class="store-shell profile-page-shell">
  <header class="store-header">
    <div>
      <h1>Perfil</h1>
      <p class="helper-text">Conoce mejor a la persona o tienda detrás de esta cuenta.</p>
    </div>
    <div class="store-actions">
      <button class="secondary-btn" onclick="history.back()">Volver</button>
      <button class="secondary-btn" onclick="window.location.href='tienda.html'">Tienda</button>
      <button class="secondary-btn" onclick="window.location.href='social.html'">Cannacrew's</button>
    </div>
  </header>

  <section class="panel-card profile-hero-card">
    <div class="profile-hero">
      <div id="userAvatar" class="profile-avatar profile-hero-avatar avatar-fallback"></div>
      <div class="profile-hero-main">
        <div class="profile-hero-head">
          <div>
            <h2 id="userHandle">usuario</h2>
            <p id="userName" class="helper-text"></p>
          </div>
        </div>
        <div class="profile-stats-row">
          <span><strong id="userPosts">0</strong> publicaciones</span>
          <span><strong id="userFollowers">0</strong> seguidores</span>
          <span><strong id="userFollowing">0</strong> seguidos</span>
        </div>
        <p id="userRole" class="product-meta"></p>
        <p id="userBio" class="profile-hero-bio"></p>
        <div class="profile-action-row">
          <button id="messageBtn" class="hidden" type="button" onclick="abrirChat()">Enviar mensaje</button>
          <button id="viewStoreBtn" class="secondary-btn hidden" type="button" onclick="scrollToProducts()">Ver productos</button>
        </div>
      </div>
    </div>
  </section>

  <section id="dealerRatingBox" class="panel-card rating-shell hidden">
    <div class="rating-summary">
      <strong id="dealerRatingSummary">Sin valoraciones todavía</strong>
      <p id="dealerRatingMeta" class="helper-text"></p>
    </div>
    <div id="ratingActions" class="rating-actions hidden"></div>
  </section>

  <section id="dealerProductsSection" class="panel-card hidden">
    <div class="section-heading">
      <div>
        <h2>Publicaciones y vitrina</h2>
        <p class="helper-text">Productos públicos visibles desde este perfil.</p>
      </div>
    </div>
    <div id="dealerProducts" class="productos-grid dense-grid"></div>
  </section>
</div>

<script>
const API_URL = window.location.origin;
const token = localStorage.getItem("token");
const currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");
const IS_LOCAL_FILE = window.location.protocol === "file:";
const userId = Number(new URLSearchParams(window.location.search).get("id"));
let viewedUserVerified = false;

if (!token || !currentUser || !userId) {
  window.location.href = "index.html";
}

async function api(path, options = {}) {
  if (IS_LOCAL_FILE) {
    const products = JSON.parse(localStorage.getItem("localProducts") || "[]");
    const posts = JSON.parse(localStorage.getItem("localSocialPosts") || "[]");
    const users = JSON.parse(localStorage.getItem("localAuthUsers") || "[]");
    const user = users.find((item) => item.id === userId);
    if (!user) {
      throw new Error("Usuario no encontrado");
    }
    if (path === `/api/users/${userId}`) {
      return {
        user: {
          id: user.id,
          role: user.role,
          nombre: user.nombre,
          apodo: user.apodo,
          bio: user.bio || "",
          foto_perfil: user.foto_perfil || "",
          correo: user.identifier.includes("@") ? user.identifier : "",
          telefono: user.telefono || "",
          verified: user.role === "admin"
        },
        products: products.filter((item) => item.dealer_id === userId),
        stats: {
          posts: posts.filter((item) => item.author_id === userId).length,
          followers: 0,
          following: 0,
          products: products.filter((item) => item.dealer_id === userId).length
        },
        rating: { average: 0, count: 0 },
        my_rating: null
      };
    }
    throw new Error("Ruta no disponible en modo local");
  }

  const response = await fetch(`${API_URL}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(options.headers || {})
    }
  });
  const data = await response.json();
  if (!response.ok) {
    throw new Error(data.error || "Error inesperado");
  }
  return data;
}

function getInitial(name) {
  return String(name || "?").trim().charAt(0).toUpperCase() || "?";
}

function verifiedMark(user) {
  return user?.verified ? ' <span class="verified-check">✔</span>' : "";
}

function roleLabel(role) {
  if (role === "admin") return "Perfil verificado";
  if (role === "dealer") return "Tienda";
  return "Usuario";
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function renderAvatar(user) {
  const avatar = document.getElementById("userAvatar");
  if (user.foto_perfil) {
    avatar.style.backgroundImage = `url("${user.foto_perfil}")`;
    avatar.textContent = "";
    avatar.classList.remove("avatar-fallback");
  } else {
    avatar.style.backgroundImage = "";
    avatar.textContent = getInitial(user.apodo || user.nombre);
    avatar.classList.add("avatar-fallback");
  }
}

function scrollToProducts() {
  document.getElementById("dealerProductsSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
}

async function abrirChat() {
  if (currentUser.id === userId) {
    return;
  }

  if (IS_LOCAL_FILE) {
    window.location.href = "chat.html";
    return;
  }

  try {
    await api("/api/conversations", {
      method: "POST",
      body: JSON.stringify({ recipient_id: userId })
    });
  } catch (error) {
  }

  window.location.href = "chat.html";
}

async function calificar(score) {
  try {
    await api(`/api/dealers/${userId}/ratings`, {
      method: "POST",
      body: JSON.stringify({ score })
    });
    await cargarPerfil();
  } catch (error) {
    alert(error.message);
  }
}

function renderRatingBox(user, rating, myRating) {
  const box = document.getElementById("dealerRatingBox");
  const actions = document.getElementById("ratingActions");
  if (user.role !== "dealer") {
    box.classList.add("hidden");
    return;
  }

  box.classList.remove("hidden");
  document.getElementById("dealerRatingSummary").textContent = rating.count
    ? `Calificación promedio: ${rating.average} / 5`
    : "Sin calificaciones todavía";
  document.getElementById("dealerRatingMeta").textContent = rating.count
    ? `${rating.count} valoraciones de la comunidad`
    : "Sé la primera persona en valorar esta tienda.";

  if (currentUser.id === user.id || currentUser.role === "admin") {
    actions.classList.add("hidden");
    actions.innerHTML = "";
    return;
  }

  actions.classList.remove("hidden");
  actions.innerHTML = [1, 2, 3, 4, 5].map((score) => `
    <button class="secondary-btn rating-btn ${myRating === score ? "active" : ""}" onclick="calificar(${score})">${score}★</button>
  `).join("");
}

function renderProducts(products) {
  const section = document.getElementById("dealerProductsSection");
  const grid = document.getElementById("dealerProducts");
  const shouldShow = viewedUserVerified && products.length;
  document.getElementById("viewStoreBtn").classList.toggle("hidden", !shouldShow);

  if (!shouldShow) {
    section.classList.add("hidden");
    return;
  }

  section.classList.remove("hidden");
  grid.innerHTML = products.map((product) => `
    <article class="product-card compact-card">
      <img src="${product.imagen}" alt="${escapeHtml(product.nombre)}">
      <div class="product-copy">
        <span class="product-meta">${escapeHtml(product.categoria || "producto")}</span>
        <h3>${escapeHtml(product.nombre)}</h3>
        <p>${escapeHtml(product.descripcion || "Sin descripción")}</p>
        <div class="price-stack">
          <strong>${escapeHtml(product.precio_mostrar || product.precio)}</strong>
        </div>
      </div>
    </article>
  `).join("");
}

async function cargarPerfil() {
  try {
    const result = await api(`/api/users/${userId}`);
    const { user, products, rating, my_rating, stats } = result;
    viewedUserVerified = Boolean(user.verified);
    renderAvatar(user);
    document.getElementById("userHandle").innerHTML = `${escapeHtml(user.apodo || user.nombre)}${verifiedMark(user)}`;
    document.getElementById("userName").textContent = user.nombre || "";
    document.getElementById("userRole").textContent = roleLabel(user.role);
    document.getElementById("userBio").textContent = user.bio || "Este usuario todavía no agregó una bio.";
    document.getElementById("userPosts").textContent = stats?.posts || 0;
    document.getElementById("userFollowers").textContent = stats?.followers || 0;
    document.getElementById("userFollowing").textContent = stats?.following || 0;
    document.getElementById("messageBtn").classList.toggle("hidden", currentUser.id === user.id);
    renderRatingBox(user, rating, my_rating);
    renderProducts(products);
  } catch (error) {
    document.querySelector(".store-shell").innerHTML = `<section class="panel-card"><p class="helper-text">${error.message}</p></section>`;
  }
}

cargarPerfil();
</script>

</body>
</html>
