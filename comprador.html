<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Registro consumidor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Registro de consumidor</h2>
  <p>Crea tu cuenta para explorar productos y conectar con dealers publicados en la plataforma.</p>

  <input type="text" id="nombre" placeholder="Nombre o apodo" maxlength="24">
  <input type="email" id="correo" placeholder="Correo electrónico">
  <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)">

  <div class="telefono-container">
    <select id="prefijo">
      <option value="+51">+51</option>
      <option value="+52">+52</option>
      <option value="+54">+54</option>
      <option value="+55">+55</option>
      <option value="+56">+56</option>
      <option value="+57">+57</option>
      <option value="+58">+58</option>
      <option value="+591">+591</option>
      <option value="+593">+593</option>
    </select>
    <input type="tel" id="telefono" placeholder="Número de teléfono" maxlength="15">
  </div>

  <button id="btnRegistro">Registrarme</button>
  <p id="estado" class="helper-text"></p>
  <a class="text-link" href="login.html">Ya tengo una cuenta</a>
</div>

<script>
const API_URL = "http://127.0.0.1:5000";

if (localStorage.getItem("terminos") !== "aceptado") {
  window.location.href = "index.html";
}

document.getElementById("btnRegistro").addEventListener("click", registrar);

async function registrar() {
  const nombre = document.getElementById("nombre").value.trim();
  const correo = document.getElementById("correo").value.trim();
  const password = document.getElementById("password").value.trim();
  const telefono = document.getElementById("prefijo").value + document.getElementById("telefono").value.trim();
  const estado = document.getElementById("estado");

  estado.textContent = "";

  if (!nombre || !correo || password.length < 6) {
    estado.textContent = "Completa nombre, correo y una contraseña válida.";
    return;
  }

  try {
    const response = await fetch(`${API_URL}/api/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        role: "consumidor",
        nombre,
        correo,
        password,
        telefono,
        acepto_terminos: true
      })
    });

    const result = await response.json();

    if (!response.ok) {
      estado.textContent = result.error || "No se pudo crear la cuenta.";
      return;
    }

    localStorage.setItem("lastRegisteredEmail", correo);
    estado.textContent = "Cuenta creada. Ahora inicia sesión.";
    setTimeout(() => {
      window.location.href = "login.html";
    }, 900);
  } catch (error) {
    estado.textContent = "No se pudo conectar con la API.";
  }
}
</script>

</body>
</html>
