<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Mensajes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">

<div class="chat-shell">
  <aside class="panel-card chat-sidebar">
    <div class="panel-header">
      <h2>Personas y chats</h2>
      <button class="secondary-btn" onclick="refreshAll()">Actualizar</button>
    </div>
    <div id="userList" class="user-list"></div>
    <div id="conversationList" class="conversation-list"></div>
  </aside>

  <main class="panel-card chat-main">
    <div class="panel-header">
      <div>
        <h1>Mensajes directos</h1>
        <p id="chatTitle" class="helper-text">Selecciona una persona para abrir una conversación.</p>
      </div>
      <div class="store-actions">
        <div class="notification-anchor">
          <button class="secondary-btn notification-btn" onclick="toggleNotifications()">
            <span>Notificaciones</span>
            <strong id="notificationCount">0</strong>
          </button>
          <div id="notificationPanel" class="notification-panel hidden"></div>
        </div>
        <button class="secondary-btn" onclick="window.location.href='perfil.html'">Mi perfil</button>
        <button class="secondary-btn" onclick="window.location.href='acerca.html'">Acerca</button>
        <button class="secondary-btn" onclick="window.location.href='tienda.html'">Tienda</button>
        <button class="secondary-btn" onclick="window.location.href='social.html'">Zona social</button>
      </div>
    </div>

    <div id="messages" class="messages-panel">
      <p class="helper-text">No hay mensajes todavía.</p>
    </div>

    <div class="composer">
      <textarea id="messageInput" placeholder="Escribe un mensaje"></textarea>
      <button id="sendBtn">Enviar</button>
    </div>
    <p id="estado" class="helper-text"></p>
  </main>
</div>

<script>
const API_URL = window.location.origin;
const token = localStorage.getItem("token");
const currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");
let activeConversationId = null;
let isRefreshingConversations = false;
let pollHandle = null;
let lastUnreadCount = 0;

if (!token || !currentUser) {
  window.location.href = "login.html";
}

document.getElementById("sendBtn").addEventListener("click", enviarMensaje);
if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission().catch(() => {});
}

async function api(path, options = {}) {
  const response = await fetch(`${API_URL}${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      ...(options.headers || {})
    }
  });

  const data = await response.json();
  if (!response.ok) {
    throw new Error(data.error || "Error inesperado");
  }
  return data;
}

function getInitial(name) {
  return String(name || "?").trim().charAt(0).toUpperCase() || "?";
}

function avatarMarkup(name, photo) {
  if (photo) {
    return `<img class="profile-avatar" src="${photo}" alt="${name}">`;
  }
  return `<div class="profile-avatar avatar-fallback">${getInitial(name)}</div>`;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function roleLabel(role) {
  if (role === "admin") return "ADM";
  if (role === "dealer") return "Dealer";
  return "Consumidor";
}

function toggleNotifications() {
  document.getElementById("notificationPanel").classList.toggle("hidden");
}

function showBrowserNotification(title, body) {
  if (!("Notification" in window) || Notification.permission !== "granted") {
    return;
  }
  if (document.visibilityState === "visible") {
    return;
  }
  new Notification(title, { body });
}

async function cargarNotificaciones() {
  try {
    const result = await api("/api/notifications");
    const count = result.unread_count || 0;
    const badge = document.getElementById("notificationCount");
    const panel = document.getElementById("notificationPanel");

    badge.textContent = String(count);
    badge.classList.toggle("has-unread", count > 0);

    if (!result.items.length) {
      panel.innerHTML = "<p class='helper-text'>No tienes notificaciones nuevas.</p>";
    } else {
      panel.innerHTML = result.items.map((item) => `
        <button class="notification-item ${item.read ? "" : "unread"}" onclick="abrirDesdeNotificacion(${item.conversation_id || 0})">
          <span class="identity-row">
            ${avatarMarkup(item.actor_nombre, item.actor_foto)}
            <span>
              <strong>${escapeHtml(item.actor_nombre)}</strong>
              <small>${escapeHtml(item.message_preview || "Nueva actividad")}</small>
            </span>
          </span>
        </button>
      `).join("");
    }

    if (count > lastUnreadCount && result.items.length) {
      const latest = result.items.find((item) => !item.read) || result.items[0];
      showBrowserNotification(`Nuevo mensaje de ${latest.actor_nombre}`, latest.message_preview || "Tienes una nueva notificación.");
    }
    lastUnreadCount = count;
  } catch (error) {
  }
}

async function abrirDesdeNotificacion(conversationId) {
  document.getElementById("notificationPanel").classList.add("hidden");
  if (!conversationId) {
    return;
  }
  const conversations = await cargarConversaciones();
  const selected = conversations.find((conversation) => conversation.id === conversationId);
  if (selected) {
    await abrirConversacion(
      selected.id,
      selected.other_user.apodo || selected.other_user.nombre,
      false
    );
  }
  await cargarNotificaciones();
}

async function cargarUsuarios() {
  const users = await api("/api/users");
  const container = document.getElementById("userList");

  if (!users.length) {
    container.innerHTML = "<p class='helper-text'>No hay otros usuarios registrados todavía.</p>";
    return;
  }

  container.innerHTML = `
    <h3 class="section-label">Iniciar chat</h3>
    ${users.map((user) => `
      <button class="user-chip" onclick="crearOAbrirChat(${user.id})">
        <span class="identity-row">
          ${avatarMarkup(user.apodo || user.nombre, user.foto_perfil)}
          <span>${user.apodo || user.nombre}</span>
        </span>
        <small>${user.role}</small>
      </button>
    `).join("")}
  `;
}

async function cargarConversaciones() {
  if (isRefreshingConversations) {
    return [];
  }
  isRefreshingConversations = true;

  try {
    const conversations = await api("/api/conversations");
    const container = document.getElementById("conversationList");

    if (!conversations.length) {
      container.innerHTML = "<p class='helper-text'>Aún no tienes conversaciones activas.</p>";
    } else {
      container.innerHTML = `
        <h3 class="section-label">Chats activos</h3>
        ${conversations.map((conversation) => `
          <button class="conversation-item ${conversation.id === activeConversationId ? "selected" : ""}" onclick="abrirConversacion(${conversation.id}, '${(conversation.other_user.apodo || conversation.other_user.nombre).replace(/'/g, "\\'")}')">
            <div class="conversation-line">
              <strong>${conversation.other_user.apodo || conversation.other_user.nombre}</strong>
              ${conversation.unread_count ? `<span class="mini-badge">${conversation.unread_count}</span>` : ""}
            </div>
            <small>${conversation.last_message ? conversation.last_message.content : "Sin mensajes todavía"}</small>
          </button>
        `).join("")}
      `;
    }

    if (!activeConversationId && conversations.length) {
      await abrirConversacion(conversations[0].id, conversations[0].other_user.nombre, false);
    }

    return conversations;
  } finally {
    isRefreshingConversations = false;
  }
}

async function crearOAbrirChat(recipientId) {
  try {
    const result = await api("/api/conversations", {
      method: "POST",
      body: JSON.stringify({ recipient_id: recipientId })
    });
    activeConversationId = result.conversation.id;
    document.getElementById("chatTitle").textContent = `Conversando con ${result.conversation.other_user.nombre}`;
    await cargarConversaciones();
    await cargarMensajes();
  } catch (error) {
    document.getElementById("estado").textContent = error.message;
  }
}

async function abrirConversacion(id, name, refresh = true) {
  activeConversationId = id;
  document.getElementById("chatTitle").textContent = `Conversando con ${name}`;
  if (refresh) {
    await cargarConversaciones();
  }
  await cargarMensajes();
  await api("/api/notifications/read", {
    method: "POST",
    body: JSON.stringify({ conversation_id: id })
  });
  await cargarNotificaciones();
}

async function cargarMensajes() {
  if (!activeConversationId) {
    return;
  }

  try {
    const messages = await api(`/api/conversations/${activeConversationId}/messages`);
    const container = document.getElementById("messages");

    if (!messages.length) {
      container.innerHTML = "<p class='helper-text'>No hay mensajes todavía.</p>";
      return;
    }

    container.innerHTML = messages.map((message) => `
      <article class="message-bubble ${message.sender_id === currentUser.id ? "own" : ""}">
        <span class="identity-row">
          ${avatarMarkup(message.sender_nombre, message.sender_foto)}
          <span class="product-meta">${message.sender_nombre}</span>
        </span>
        <p>${message.content}</p>
      </article>
    `).join("");
    container.scrollTop = container.scrollHeight;
  } catch (error) {
    document.getElementById("estado").textContent = error.message;
  }
}

function startPolling() {
  if (pollHandle) {
    clearInterval(pollHandle);
  }

  pollHandle = setInterval(async () => {
    try {
      await cargarConversaciones();
      await cargarNotificaciones();
      if (activeConversationId) {
        await cargarMensajes();
      }
    } catch (error) {
    }
  }, 3000);
}

async function enviarMensaje() {
  const input = document.getElementById("messageInput");
  const content = input.value.trim();
  const estado = document.getElementById("estado");
  estado.textContent = "";

  if (!activeConversationId) {
    estado.textContent = "Abre una conversación primero.";
    return;
  }

  if (!content) {
    estado.textContent = "Escribe un mensaje antes de enviar.";
    return;
  }

  try {
    await api(`/api/conversations/${activeConversationId}/messages`, {
      method: "POST",
      body: JSON.stringify({ content })
    });
    input.value = "";
    await cargarMensajes();
    await cargarConversaciones();
  } catch (error) {
    estado.textContent = error.message;
  }
}

async function refreshAll() {
  try {
    await cargarUsuarios();
    await cargarConversaciones();
    await cargarNotificaciones();
  } catch (error) {
    document.getElementById("estado").textContent = error.message;
  }
}

(async function init() {
  await refreshAll();
  const pendingConversationId = localStorage.getItem("chatConversationId");
  if (pendingConversationId) {
    localStorage.removeItem("chatConversationId");
    const conversations = await cargarConversaciones();
    const selected = conversations.find((conversation) => conversation.id === Number(pendingConversationId));
    if (selected) {
      await abrirConversacion(
        selected.id,
        selected.other_user.apodo || selected.other_user.nombre,
        false
      );
    }
  }
  const pendingRecipientId = localStorage.getItem("chatRecipientId");
  if (pendingRecipientId) {
    localStorage.removeItem("chatRecipientId");
    await crearOAbrirChat(Number(pendingRecipientId));
  }
  const draft = localStorage.getItem("chatDraft");
  if (draft) {
    document.getElementById("messageInput").value = draft;
    localStorage.removeItem("chatDraft");
  }
  startPolling();
})();

window.addEventListener("beforeunload", () => {
  if (pollHandle) {
    clearInterval(pollHandle);
  }
});

document.addEventListener("click", (event) => {
  const anchor = document.querySelector(".notification-anchor");
  if (anchor && !anchor.contains(event.target)) {
    document.getElementById("notificationPanel").classList.add("hidden");
  }
});
</script>

</body>
</html>
