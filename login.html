<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannafy | Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Iniciar sesión</h2>
  <p>Accede con tu cuenta de consumidor o dealer.</p>

  <input type="email" id="correo" placeholder="Correo electrónico">
  <input type="password" id="password" placeholder="Contraseña">
  <button id="btnLogin">Entrar</button>
  <p id="estado" class="helper-text"></p>
  <a class="text-link" href="rol.html">Crear una cuenta nueva</a>
</div>

<script>
const API_URL = "http://127.0.0.1:5000";

const correoInput = document.getElementById("correo");
const savedEmail = localStorage.getItem("lastRegisteredEmail");
if (savedEmail) {
  correoInput.value = savedEmail;
}

document.getElementById("btnLogin").addEventListener("click", login);

async function login() {
  const correo = document.getElementById("correo").value.trim();
  const password = document.getElementById("password").value;
  const estado = document.getElementById("estado");

  estado.textContent = "";

  try {
    const response = await fetch(`${API_URL}/api/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ correo, password })
    });

    const result = await response.json();

    if (!response.ok) {
      estado.textContent = result.error || "No se pudo iniciar sesión.";
      return;
    }

    localStorage.setItem("token", result.token);
    localStorage.setItem("currentUser", JSON.stringify(result.user));
    localStorage.removeItem("lastRegisteredEmail");

    if (result.user.role === "dealer") {
      window.location.href = "vendedor.html";
      return;
    }

    window.location.href = "tienda.html";
  } catch (error) {
    estado.textContent = "No se pudo conectar con la API.";
  }
}
</script>

</body>
</html>
